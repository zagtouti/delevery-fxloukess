<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fxloukess — Connexion</title>
  <script>tailwind={config:{darkMode:"class"}}</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/app.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .shake { animation: shake .4s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-gray-100 flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-green-500 rounded-2xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-5 8.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM3 6h12v6H3V6zm3 8.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">fxloukess</h1>
      <p class="text-sm text-gray-500 mt-1">Gestion de station de livraison</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-7">
      <h2 class="text-lg font-semibold text-gray-900 mb-6">Connexion</h2>

      <!-- Error -->
      <div id="error-box" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3"></div>

      <!-- Form -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Numéro de téléphone</label>
          <input id="phone" type="tel" placeholder="0555 000 000"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition"
            autocomplete="username">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Mot de passe</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition"
              autocomplete="current-password">
            <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button id="login-btn" onclick="doLogin()"
          class="w-full bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-medium py-3 rounded-xl text-sm transition shadow-sm">
          Se connecter
        </button>
      </div>

      <div class="mt-5 pt-4 border-t border-gray-100 text-center">
        <a href="/track" class="text-xs text-gray-400 hover:text-green-600 transition">
          Suivre un colis →
        </a>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-5">fxloukess v2.0 — usage interne</p>
  </div>

  <script>
    // Auto-redirect if already logged in
    const tok = localStorage.getItem('token')
    const role = localStorage.getItem('role')
    if (tok && role) {
      const pages = { superadmin:'/superadmin', regional_manager:'/superadmin',
                      frontdesk:'/frontdesk', dispatch:'/dispatch',
                      returns:'/returns', driver:'/driver' }
      if (pages[role]) window.location.replace(pages[role])
    }

    document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus() })
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

    function togglePw() {
      const inp = document.getElementById('password')
      inp.type = inp.type === 'password' ? 'text' : 'password'
    }

    function showError(msg) {
      const box = document.getElementById('error-box')
      box.textContent = msg
      box.classList.remove('hidden')
      box.classList.add('shake')
      setTimeout(() => box.classList.remove('shake'), 500)
    }

    function setLoading(loading) {
      const btn = document.getElementById('login-btn')
      btn.disabled = loading
      btn.textContent = loading ? 'Connexion…' : 'Se connecter'
    }

    async function doLogin() {
      const phone    = document.getElementById('phone').value.trim()
      const password = document.getElementById('password').value

      if (!phone)    { showError('Entrez votre numéro de téléphone'); return }
      if (!password) { showError('Entrez votre mot de passe'); return }

      setLoading(true)
      document.getElementById('error-box').classList.add('hidden')

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ phone, password }),
        })
        const data = await res.json()

        if (!res.ok) {
          const msg = res.status === 429
            ? 'Trop de tentatives — attendez une minute'
            : data.detail || 'Identifiants incorrects'
          showError(msg)
          return
        }

        if (data.token) localStorage.setItem('token', data.token)
        localStorage.setItem('role',  data.role)
        localStorage.setItem('name',  data.name)
        localStorage.setItem('station_id', data.station_id || '')

        const pages = {
          superadmin:       '/superadmin',
          regional_manager: '/superadmin',
          frontdesk:        '/frontdesk',
          dispatch:         '/dispatch',
          returns:          '/returns',
          driver:           '/driver',
          seller:           '/seller',
        }
        window.location.href = pages[data.role] || '/superadmin'
      } catch {
        showError('Impossible de joindre le serveur')
      } finally {
        setLoading(false)
      }
    }
  </script>
</body>
</html>
