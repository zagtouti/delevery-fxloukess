<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fxloukess — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
    }

    .hero-bg {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px -10px rgb(0 0 0 / 0.25);
    }
  </style>
</head>
<body class="hero-bg flex items-center justify-center p-6">

  <!-- Background Overlay -->
  <div class="absolute inset-0 bg-black/50 z-[-1]"></div>

  <!-- Compact Horizontal Card -->
  <div class="card w-full max-w-4xl rounded-3xl overflow-hidden grid md:grid-cols-5 shadow-2xl">

    <!-- Left Side: Form -->
    <div class="md:col-span-3 p-8 lg:p-10 flex flex-col justify-center">
      <div class="max-w-sm mx-auto w-full">

        <!-- Logo -->
        <div class="flex items-center gap-3 mb-8">
          <div class="w-11 h-11 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/>
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-semibold text-gray-900">fxloukess</h1>
            <p class="text-xs text-gray-500">LOGISTICS</p>
          </div>
        </div>

        <h2 class="text-xl font-medium text-gray-800 mb-1">Bonjour !</h2>
        <p class="text-gray-600 mb-8 text-[15px]">Connectez-vous pour commencer votre journée</p>

        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-2xl px-5 py-3 mb-6"></div>

        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 tracking-widest">NUMÉRO DE TÉLÉPHONE</label>
            <input id="phone" type="tel" placeholder="0555 000 000"
              class="w-full border border-gray-200 rounded-2xl px-5 py-3.5 text-base focus:border-green-500 focus:ring-green-200 outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 tracking-widest">MOT DE PASSE</label>
            <input id="password" type="password" placeholder="••••••••"
              class="w-full border border-gray-200 rounded-2xl px-5 py-3.5 text-base focus:border-green-500 focus:ring-green-200 outline-none transition">
          </div>

          <button id="loginBtn" onclick="login()"
            class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 
                   text-white font-semibold py-3.5 rounded-2xl text-base transition-all active:scale-[0.98]">
            Se connecter
          </button>
        </div>

        <div class="mt-8 text-center">
          <a href="/track" class="text-sm text-gray-500 hover:text-gray-700">Suivi public des colis →</a>
        </div>
      </div>
    </div>

    <!-- Right Side: Visual -->
    <div class="hidden md:block md:col-span-2 bg-cover bg-center relative"
         style="background-image: url('https://picsum.photos/id/1015/800/900');">
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 to-transparent"></div>
    </div>

  </div>

  <script>
    // Random Backgrounds
    const backgrounds = [
      "https://picsum.photos/id/1015/2000/1200",
      "https://picsum.photos/id/1036/2000/1200",
      "https://picsum.photos/id/106/2000/1200",
      "https://picsum.photos/id/201/2000/1200",
      "https://picsum.photos/id/251/2000/1200",
      "https://picsum.photos/id/870/2000/1200",
      "https://picsum.photos/id/1018/2000/1200",
      "https://picsum.photos/id/133/2000/1200"
    ];

    function setRandomBackground() {
      const randomIndex = Math.floor(Math.random() * backgrounds.length);
      document.body.style.backgroundImage = `url('${backgrounds[randomIndex]}')`;
    }

    window.addEventListener('load', setRandomBackground);

    // Login functionality
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('error');

      if (!phone || !password) {
        showError('Veuillez remplir tous les champs');
        return;
      }

      btn.textContent = 'Connexion en cours...';
      btn.disabled = true;
      error.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Identifiants incorrects');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name);

        const routes = {
          superadmin: '/superadmin',
          regional_manager: '/manager',
          frontdesk: '/frontdesk',
          dispatch: '/dispatch',
          returns: '/returns',
          driver: '/driver',
          seller: '/seller'
        };

        window.location.href = routes[data.role] || '/dashboard';

      } catch (e) {
        showError('Erreur de connexion. Réessayez.');
      } finally {
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const error = document.getElementById('error');
      error.textContent = msg;
      error.classList.remove('hidden');
    }
  </script>
</body>
</html>
