<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fxloukess — Livreur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background:#f9fafb; }
    .status-badge { display:inline-flex; padding:2px 10px; border-radius:9999px; font-size:12px; font-weight:500; }
    .status-out_for_delivery { background:#fff7ed; color:#c2410c; }
    .status-delivered { background:#f0fdf4; color:#15803d; }
    .status-failed { background:#fef2f2; color:#dc2626; }
    .status-rescheduled { background:#fefce8; color:#a16207; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <div class="sticky top-0 z-10 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
      </div>
      <div>
        <div class="text-sm font-medium text-gray-900" id="driver-name">Livreur</div>
        <div class="text-xs text-gray-400">fxloukess</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="text-right">
        <div class="text-xs text-gray-400">Cash</div>
        <div class="text-sm font-bold text-green-600" id="cash-display">0 DZD</div>
      </div>
      <button onclick="logout()" class="text-gray-400 hover:text-red-500 p-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="bg-white border-b border-gray-100 flex">
    <button onclick="showTab('pending')" id="tab-pending" class="flex-1 py-3 text-sm font-medium text-green-600 border-b-2 border-green-500">En cours</button>
    <button onclick="showTab('done')" id="tab-done" class="flex-1 py-3 text-sm font-medium text-gray-400 border-b-2 border-transparent">Terminés</button>
  </div>

  <!-- Stats bar -->
  <div class="bg-white border-b border-gray-100 px-4 py-3 flex gap-4 text-center">
    <div class="flex-1">
      <div class="text-lg font-bold text-gray-900" id="stat-pending">0</div>
      <div class="text-xs text-gray-400">En cours</div>
    </div>
    <div class="flex-1">
      <div class="text-lg font-bold text-green-600" id="stat-delivered">0</div>
      <div class="text-xs text-gray-400">Livrés</div>
    </div>
    <div class="flex-1">
      <div class="text-lg font-bold text-red-500" id="stat-failed">0</div>
      <div class="text-xs text-gray-400">Échoués</div>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4" id="packages-list">
    <div class="text-sm text-gray-400 text-center py-8">Chargement...</div>
  </div>

  <!-- Update status modal -->
  <div id="status-modal" class="hidden fixed inset-0 bg-black/40 flex items-end z-50">
    <div class="bg-white rounded-t-2xl w-full p-6">
      <div class="text-base font-medium text-gray-900 mb-1" id="modal-tracking"></div>
      <div class="text-sm text-gray-500 mb-4" id="modal-recipient"></div>
      <div class="space-y-2 mb-4">
        <button onclick="updateStatus('delivered')" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl text-sm font-medium">✓ Livré</button>
        <button onclick="updateStatus('failed')" class="w-full bg-red-50 text-red-600 hover:bg-red-100 py-3 rounded-xl text-sm font-medium">✗ Échec — Client absent</button>
        <button onclick="updateStatus('rescheduled')" class="w-full bg-yellow-50 text-yellow-700 hover:bg-yellow-100 py-3 rounded-xl text-sm font-medium">↺ Reprogrammer</button>
        <button onclick="updateStatus('waiting_for_client')" class="w-full bg-blue-50 text-blue-700 hover:bg-blue-100 py-3 rounded-xl text-sm font-medium">⏳ Client rappelé</button>
      </div>
      <button onclick="closeModal()" class="w-full border border-gray-200 py-3 rounded-xl text-sm text-gray-500">Annuler</button>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token')
    if (!token) window.location.href = '/login'

    const name = localStorage.getItem('name') || 'Livreur'
    document.getElementById('driver-name').textContent = name

    let allPackages = []
    let activePackageId = null
    let currentTab = 'pending'

    function api(url, options={}) {
      return fetch(url, {
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        ...options
      }).then(r => r.ok ? r.json() : Promise.reject(r))
    }

    function showTab(tab) {
      currentTab = tab
      document.getElementById('tab-pending').className = 'flex-1 py-3 text-sm font-medium ' + (tab==='pending' ? 'text-green-600 border-b-2 border-green-500' : 'text-gray-400 border-b-2 border-transparent')
      document.getElementById('tab-done').className = 'flex-1 py-3 text-sm font-medium ' + (tab==='done' ? 'text-green-600 border-b-2 border-green-500' : 'text-gray-400 border-b-2 border-transparent')
      renderPackages()
    }

    async function loadPackages() {
      const me = await api('/api/auth/me')
      // Get driver record
      const drivers = await api('/api/drivers')
      const driver = drivers.find(d => d.user_id === me.id || d.phone === me.phone)
      if (!driver) { document.getElementById('packages-list').innerHTML = '<div class="text-sm text-gray-400 text-center py-8">Profil livreur introuvable</div>'; return }

      document.getElementById('cash-display').textContent = Number(driver.cash_on_hand || 0).toLocaleString() + ' DZD'
      allPackages = await api(`/api/dispatch/driver/${driver.id}/bag`)
      // Also get packages with status assigned/out
      renderPackages()
      updateStats()
    }

    function renderPackages() {
      const filtered = currentTab === 'pending'
        ? allPackages.filter(p => ['assigned','out_for_delivery','rescheduled','waiting_for_client','failed'].includes(p.status))
        : allPackages.filter(p => ['delivered','returned'].includes(p.status))

      const list = document.getElementById('packages-list')
      if (!filtered.length) {
        list.innerHTML = '<div class="text-sm text-gray-400 text-center py-8">Aucun colis</div>'
        return
      }
      list.innerHTML = filtered.map(p => `
        <div class="bg-white border border-gray-100 rounded-xl p-4 mb-3" onclick="openStatusModal('${p.id}')">
          <div class="flex items-start justify-between mb-2">
            <div>
              <div class="font-mono text-xs font-bold text-gray-900">${p.tracking_id}</div>
              <div class="text-sm font-medium text-gray-800 mt-0.5">${p.recipient_name}</div>
            </div>
            <span class="status-badge status-${p.status}">${statusLabel(p.status)}</span>
          </div>
          <div class="text-xs text-gray-500">${p.wilaya} — ${p.commune}</div>
          <div class="text-xs text-gray-400 mt-1">${p.address}</div>
          <div class="flex items-center justify-between mt-3">
            <div class="text-sm font-bold text-green-600">${Number(p.cod_amount).toLocaleString()} DZD</div>
            <div class="flex gap-2 text-xs text-gray-400">
              <a href="tel:${p.recipient_phone}" onclick="event.stopPropagation()" class="text-blue-500 underline">${p.recipient_phone}</a>
            </div>
          </div>
          ${p.is_fragile ? '<div class="text-xs text-orange-500 mt-1">⚠ Fragile</div>' : ''}
        </div>
      `).join('')
    }

    function statusLabel(s) {
      const map = { out_for_delivery:'En livraison', delivered:'Livré', failed:'Échoué', rescheduled:'Reprogrammé', assigned:'Assigné', waiting_for_client:'Rappelé' }
      return map[s] || s
    }

    function updateStats() {
      document.getElementById('stat-pending').textContent = allPackages.filter(p => p.status === 'out_for_delivery' || p.status === 'assigned').length
      document.getElementById('stat-delivered').textContent = allPackages.filter(p => p.status === 'delivered').length
      document.getElementById('stat-failed').textContent = allPackages.filter(p => p.status === 'failed').length
    }

    function openStatusModal(id) {
      const p = allPackages.find(x => x.id === id)
      if (!p || p.status === 'delivered' || p.status === 'returned') return
      activePackageId = id
      document.getElementById('modal-tracking').textContent = p.tracking_id
      document.getElementById('modal-recipient').textContent = p.recipient_name + ' — ' + p.wilaya
      document.getElementById('status-modal').classList.remove('hidden')
    }

    function closeModal() {
      activePackageId = null
      document.getElementById('status-modal').classList.add('hidden')
    }

    async function updateStatus(newStatus) {
      const needs = ['failed','returned','rescheduled','lost']
      let reason = null
      if (needs.includes(newStatus)) {
        reason = prompt('Raison:') || 'client_absent'
      }
      await api(`/api/packages/${activePackageId}/status`, {
        method:'PATCH',
        body: JSON.stringify({ status: newStatus, reason })
      })
      closeModal()
      await loadPackages()
    }

    async function logout() {
      await fetch('/api/auth/logout', { method:'POST' })
      localStorage.clear()
      window.location.href = '/login'
    }

    loadPackages()
  </script>
</body>
</html>
