<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>fxloukess — Livreur</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;max-width:600px;margin:0 auto}
  .status-badge{display:inline-flex;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600}
  .bottom-sheet{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end}
  .sheet-content{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;margin:0 auto;padding:24px;box-shadow:0 -8px 32px rgba(0,0,0,.12)}
  .sheet-handle{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 20px}
  .action-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:none;width:100%;text-align:left;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;margin-bottom:8px}
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}
  .spinner{width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Header -->
<div class="bg-white border-b border-gray-100 sticky top-0 z-10">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-green-500 rounded-xl flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
      </div>
      <div>
        <div class="text-sm font-semibold text-gray-900" id="driver-name">Livreur</div>
        <div class="text-xs text-gray-400">fxloukess</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <div class="text-xs text-gray-400">Cash</div>
        <div class="text-sm font-bold text-orange-600" id="cash-display">—</div>
      </div>
      <button onclick="logout()" class="text-gray-300 hover:text-red-500 p-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex border-t border-gray-100">
    <button onclick="showTab('active')" id="tab-active" class="flex-1 py-2.5 text-xs font-semibold text-green-600 border-b-2 border-green-500">En cours</button>
    <button onclick="showTab('done')" id="tab-done" class="flex-1 py-2.5 text-xs font-semibold text-gray-400 border-b-2 border-transparent">Terminés</button>
  </div>
</div>

<!-- Stats bar -->
<div class="bg-white border-b border-gray-100 grid grid-cols-3 text-center py-3">
  <div><div class="text-lg font-bold text-orange-500" id="stat-active">0</div><div class="text-xs text-gray-400">En cours</div></div>
  <div><div class="text-lg font-bold text-green-600" id="stat-done">0</div><div class="text-xs text-gray-400">Livrés</div></div>
  <div><div class="text-lg font-bold text-red-500" id="stat-failed">0</div><div class="text-xs text-gray-400">Échecs</div></div>
</div>

<!-- Package list -->
<div class="p-3" id="pkg-list">
  <div class="flex justify-center py-12"><div class="spinner"></div></div>
</div>

<!-- Status bottom sheet -->
<div id="bottom-sheet" class="bottom-sheet hidden" onclick="if(event.target===this)closeSheet()">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="font-semibold text-gray-900 mb-0.5" id="sheet-tracking"></div>
    <div class="text-sm text-gray-500 mb-5" id="sheet-recipient"></div>
    <button onclick="doStatus('delivered')" class="action-btn bg-green-50 hover:bg-green-100 text-green-800">
      <span class="text-xl">✓</span> Livré — COD encaissé
    </button>
    <button onclick="doStatus('failed')" class="action-btn bg-red-50 hover:bg-red-100 text-red-800">
      <span class="text-xl">✗</span> Échec — Client absent
    </button>
    <button onclick="doStatus('rescheduled')" class="action-btn bg-yellow-50 hover:bg-yellow-100 text-yellow-800">
      <span class="text-xl">↺</span> Reprogrammer
    </button>
    <button onclick="doStatus('waiting_for_client')" class="action-btn bg-blue-50 hover:bg-blue-100 text-blue-800">
      <span class="text-xl">⏳</span> Client rappelé — attente
    </button>
    <button onclick="closeSheet()" class="action-btn bg-gray-50 hover:bg-gray-100 text-gray-600 mt-2">
      <span class="text-xl">←</span> Annuler
    </button>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('token')
if (!TOKEN) location.replace('/login')

const NAME = localStorage.getItem('name') || 'Livreur'
document.getElementById('driver-name').textContent = NAME

let allPackages = []
let currentTab  = 'active'
let activeId    = null
let driverId    = null

const STATUS_LABEL = {
  created:'Créé', assigned:'Assigné', out_for_delivery:'En livraison',
  delivered:'Livré', failed:'Échoué', returned:'Retourné',
  rescheduled:'Reprogrammé', waiting_for_client:'Rappelé',
}
const STATUS_CLR = {
  out_for_delivery:'bg-orange-100 text-orange-700',
  assigned:'bg-purple-100 text-purple-700',
  delivered:'bg-green-100 text-green-700',
  failed:'bg-red-100 text-red-700',
  rescheduled:'bg-yellow-100 text-yellow-700',
  waiting_for_client:'bg-blue-100 text-blue-700',
}

function api(url, opts={}) {
  opts.headers={'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}
  return fetch(url,opts).then(r=>{
    if(r.status===401){localStorage.clear();location.replace('/login')}
    return r.ok ? r.json() : r.json().then(d=>{throw new Error(d.detail||'Erreur')})
  })
}

function toast(msg, type='ok') {
  const el = document.createElement('div')
  el.className = `toast ${type==='ok'?'bg-gray-900 text-white':'bg-red-600 text-white'}`
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(()=>el.remove(),3000)
}

async function loadPackages() {
  const me = await api('/api/auth/me')
  // Find driver record for this user
  const drivers = await api('/api/drivers')
  const d = drivers.find(x => x.user_id === me.id)
  if (!d) {
    document.getElementById('pkg-list').innerHTML = '<div class="text-center py-12 text-sm text-gray-400">Profil livreur introuvable.<br>Contactez l\'administration.</div>'
    return
  }
  driverId = d.id
  document.getElementById('cash-display').textContent = (d.cash_on_hand||0).toLocaleString('fr-DZ') + ' DZD'
  allPackages = await api(`/api/dispatch/driver/${d.id}/bag`)
  renderPackages()
  updateStats()
}

function renderPackages() {
  const ACTIVE_STATUSES = ['assigned','out_for_delivery','rescheduled','waiting_for_client','failed']
  const DONE_STATUSES   = ['delivered','returned']
  const filtered = allPackages.filter(p =>
    currentTab === 'active' ? ACTIVE_STATUSES.includes(p.status) : DONE_STATUSES.includes(p.status)
  )

  const list = document.getElementById('pkg-list')
  if (!filtered.length) {
    list.innerHTML = `<div class="text-center py-12 text-sm text-gray-400">${currentTab==='active'?'Aucun colis en cours':'Aucun colis terminé'}</div>`
    return
  }
  list.innerHTML = filtered.map(p=>`
    <div onclick="openSheet('${p.id}')" class="bg-white rounded-xl border border-gray-100 p-4 mb-3 cursor-pointer active:opacity-80 transition">
      <div class="flex items-start justify-between mb-2">
        <div>
          <div class="font-mono text-xs font-bold text-gray-900">${p.tracking_id}</div>
          <div class="text-sm font-semibold text-gray-800 mt-0.5">${p.recipient_name}</div>
        </div>
        <span class="status-badge ${STATUS_CLR[p.status]||'bg-gray-100 text-gray-600'} flex-shrink-0 ml-2">${STATUS_LABEL[p.status]||p.status}</span>
      </div>
      <div class="text-xs text-gray-500 mb-1">${p.wilaya} — ${p.commune}</div>
      <div class="text-xs text-gray-400 mb-3">${p.address}</div>
      <div class="flex items-center justify-between">
        <span class="font-bold text-green-700 text-base">${p.cod_amount.toLocaleString('fr-DZ')} DZD</span>
        <div class="flex gap-2">
          ${p.is_fragile?'<span class="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full">Fragile</span>':''}
          <a href="tel:${p.recipient_phone}" onclick="event.stopPropagation()" class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium">📞 Appeler</a>
        </div>
      </div>
    </div>`).join('')
}

function updateStats() {
  document.getElementById('stat-active').textContent  = allPackages.filter(p=>['out_for_delivery','assigned'].includes(p.status)).length
  document.getElementById('stat-done').textContent    = allPackages.filter(p=>p.status==='delivered').length
  document.getElementById('stat-failed').textContent  = allPackages.filter(p=>p.status==='failed').length
}

function showTab(tab) {
  currentTab = tab
  document.getElementById('tab-active').className = 'flex-1 py-2.5 text-xs font-semibold ' + (tab==='active'?'text-green-600 border-b-2 border-green-500':'text-gray-400 border-b-2 border-transparent')
  document.getElementById('tab-done').className   = 'flex-1 py-2.5 text-xs font-semibold ' + (tab==='done'?'text-green-600 border-b-2 border-green-500':'text-gray-400 border-b-2 border-transparent')
  renderPackages()
}

function openSheet(id) {
  const p = allPackages.find(x=>x.id===id)
  if (!p) return
  if (['delivered','returned'].includes(p.status)) return
  activeId = id
  document.getElementById('sheet-tracking').textContent  = p.tracking_id
  document.getElementById('sheet-recipient').textContent = p.recipient_name + ' — ' + p.wilaya + ' — ' + p.cod_amount.toLocaleString('fr-DZ') + ' DZD'
  document.getElementById('bottom-sheet').classList.remove('hidden')
}

function closeSheet() { document.getElementById('bottom-sheet').classList.add('hidden'); activeId = null }

async function doStatus(status) {
  if (!activeId) return
  const NEEDS_REASON = ['failed','rescheduled','returned']
  let reason = null
  if (NEEDS_REASON.includes(status)) {
    const reasons = {
      failed:'client_absent', rescheduled:'rescheduled_by_client', returned:'refused'
    }
    reason = reasons[status]
  }
  try {
    await api(`/api/packages/${activeId}/status`,{method:'PATCH',body:JSON.stringify({status,reason})})
    toast(status==='delivered'?'Livraison confirmée ✓':'Statut mis à jour')
    closeSheet()
    await loadPackages()
  } catch(e) { toast(e.message,'err') }
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+TOKEN}}).catch(()=>{})
  localStorage.clear(); location.replace('/login')
}

loadPackages()
</script>
</body>
</html>
