<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>fxloukess — Retours</title>
<script>tailwind={config:{darkMode:"class"}}</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/app.js"></script>
<style>
  body{font-family:system-ui,-apple-system,sans-serif}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:#6b7280;cursor:pointer;transition:all .15s}
  .nav-item:hover{background:#f0fdf4;color:#16a34a}
  .nav-item.active{background:#dcfce7;color:#15803d;font-weight:500}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
  .btn-green{background:#22c55e;color:#fff}.btn-green:hover{background:#16a34a}
  .btn-ghost{background:#fff;border:1px solid #e5e7eb;color:#374151}.btn-ghost:hover{background:#f9fafb}
  .btn-red{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}.btn-red:hover{background:#fee2e2}
  .input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
  .input:focus{border-color:#22c55e;box-shadow:0 0 0 3px #dcfce7}
  .select{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;outline:none}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;background:#f9fafb}
  td{padding:10px 16px;border-bottom:1px solid #f3f4f6;color:#374151}
  tr:last-child td{border-bottom:none}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
  .toast{position:fixed;bottom:24px;right:24px;z-index:100;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.12);animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  #content>div{display:none}#content>div.active{display:block}
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen dark:text-gray-100">

<aside class="fixed left-0 top-0 h-full w-52 bg-white border-r border-gray-100 flex flex-col z-10">
  <div class="p-4 border-b border-gray-100 flex items-center gap-2.5">
    <div class="w-8 h-8 bg-green-500 rounded-xl flex items-center justify-center">
      <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
    </div>
    <span class="font-semibold text-gray-900 text-sm">fxloukess</span>
  </div>
  <nav class="flex-1 p-3 space-y-0.5">
    <div class="nav-item active" onclick="nav('zone')" id="nav-zone">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
      Zone retours <span id="returns-badge" class="ml-auto text-xs bg-red-100 text-red-700 font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
    </div>
    <div class="nav-item" onclick="nav('payout')" id="nav-payout">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
      Paiements
    </div>
  </nav>
  <div class="p-3 border-t border-gray-100">
    <div class="flex items-center gap-2 px-2 py-2">
      <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-green-700 text-xs font-bold" id="user-initials">RT</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-semibold text-gray-900 truncate" id="user-name">Retours</div>
        <div class="text-xs text-gray-400">Retours</div>
      </div>
      <button onclick="logout()" class="text-gray-300 hover:text-red-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </div>
</aside>

<main class="ml-52 p-6" id="content">

  <!-- ZONE RETOURS -->
  <div id="page-zone" class="active">
    <div class="mb-5 flex items-center justify-between">
      <div><h1 class="text-xl font-semibold text-gray-900">Zone retours</h1><p class="text-sm text-gray-500 mt-0.5">Colis échoués récupérés auprès des livreurs</p></div>
      <button class="btn btn-ghost" onclick="loadZone()">Rafraîchir</button>
    </div>
    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden" id="zone-table">
      <div class="text-center py-8 text-sm text-gray-400">Chargement…</div>
    </div>
  </div>

  <!-- PAIEMENTS -->
  <div id="page-payout">
    <div class="mb-5"><h1 class="text-xl font-semibold text-gray-900">Paiements expéditeurs</h1><p class="text-sm text-gray-500 mt-0.5">Versements COD aux expéditeurs</p></div>
    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden" id="payout-table">
      <div class="text-center py-8 text-sm text-gray-400">Chargement…</div>
    </div>
  </div>

</main>

<!-- Reason modal -->
<div id="reason-modal" class="overlay hidden">
  <div class="modal p-6">
    <h3 class="font-semibold text-gray-900 mb-1" id="rm-title">Confirmer</h3>
    <p class="text-sm text-gray-500 mb-4" id="rm-sub"></p>
    <div class="space-y-2 mb-4" id="rm-reasons"></div>
    <div class="grid grid-cols-2 gap-2"><div><label class="text-xs text-gray-500 mb-1 block">Date reprogrammation</label><input class="input" id="rm-date" type="date"></div><div><label class="text-xs text-gray-500 mb-1 block">Code raison échec</label><select class="select" id="rm-fail-code"><option value="">—</option><option value="client_absent">Client absent</option><option value="wrong_address">Adresse incorrecte</option><option value="no_answer">Injoignable</option><option value="refused">Refus client</option></select></div></div><div class="mt-3"><label class="text-xs text-gray-500 mb-1 block">Note (optionnel)</label><input class="input" id="rm-note" placeholder="Précision…"></div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-ghost flex-1 justify-center" onclick="closeReason()">Annuler</button>
      <button class="btn btn-green flex-1 justify-center" id="rm-confirm">Confirmer</button>
    </div>
  </div>
</div>

<!-- Payout modal -->
<div id="payout-modal" class="overlay hidden">
  <div class="modal p-6">
    <h3 class="font-semibold text-gray-900 mb-1">Verser paiement</h3>
    <p class="text-sm text-gray-500 mb-4" id="pm-seller"></p>
    <div class="space-y-3">
      <div><label class="text-xs text-gray-500 mb-1 block">Montant (DZD)</label><input class="input" id="pm-amount" type="number"></div>
      <div><label class="text-xs text-gray-500 mb-1 block">Note</label><input class="input" id="pm-note" value="Versement COD"></div>
    </div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-ghost flex-1 justify-center" onclick="closePayout()">Annuler</button>
      <button class="btn btn-green flex-1 justify-center" onclick="confirmPayout()">Verser</button>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('token')
if (!TOKEN) console.info('Using cookie-based session')

const NAME = localStorage.getItem('name') || 'RT'
document.getElementById('user-name').textContent = NAME
document.getElementById('user-initials').textContent = NAME.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()

let activeSellerId = null

const REASONS = [
  {val:'client_absent',   label:'Client absent'},
  {val:'refused',         label:'Refus du client'},
  {val:'wrong_address',   label:'Mauvaise adresse'},
  {val:'no_answer',       label:'Téléphone injoignable'},
  {val:'damaged',         label:'Colis endommagé'},
  {val:'rescheduled_by_client', label:'Reporté par le client'},
]

function api(url, opts={}) {
  opts.headers = authHeaders(opts.headers || {})
  return fetch(url,opts).then(r=>{
    if (r.status===401){sessionExpired()}
    return r.ok ? r.json() : r.json().then(d=>{throw new Error(d.detail||'Erreur')})
  })
}

function toast(msg, type='ok') {
  const el = document.createElement('div')
  el.className = `toast ${type==='ok'?'bg-gray-900 text-white':'bg-red-600 text-white'}`
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(()=>el.remove(),3500)
}

function nav(page) {
  document.querySelectorAll('[id^="nav-"]').forEach(el=>el.classList.remove('active'))
  document.querySelectorAll('#content > div').forEach(el=>el.classList.remove('active'))
  document.getElementById('nav-'+page)?.classList.add('active')
  document.getElementById('page-'+page)?.classList.add('active')
  const loaders = {zone:loadZone, payout:loadPayout}
  loaders[page]?.()
}

// ── Zone retours ──────────────────────────────────────────────────────────────
const STATUS_FR = {returned:'Retourné',failed:'Échoué',rescheduled:'Reprogrammé',out_for_delivery:'En livraison'}

async function loadZone() {
  const data = await api('/api/returns')
  const badge = document.getElementById('returns-badge')
  if (data.length) { badge.textContent = data.length; badge.classList.remove('hidden') }
  else badge.classList.add('hidden')

  const el = document.getElementById('zone-table')
  if (!data.length) { el.innerHTML = '<div class="text-center py-8 text-sm text-gray-400">Aucun retour en attente</div>'; return }
  el.innerHTML = `<table>
    <thead><tr><th><input type="checkbox" onchange="document.querySelectorAll('.ret-check').forEach(c=>c.checked=this.checked)"></th><th>Tracking</th><th>Destinataire</th><th>Wilaya</th><th>COD</th><th>Tentatives</th><th>Statut</th><th>Actions</th></tr></thead>
    <tbody>${data.map(p=>`
      <tr>
        <td><input class="ret-check" type="checkbox" value="${p.id}"></td><td class="font-mono text-xs font-bold">${p.tracking_id}</td>
        <td class="font-medium">${p.recipient_name}</td>
        <td>${p.wilaya}</td>
        <td class="font-semibold text-green-700">${p.cod_amount.toLocaleString('fr-DZ')} DZD</td>
        <td class="text-gray-500">${p.attempts}</td>
        <td><span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${STATUS_FR[p.status]||p.status}</span></td>
        <td>
          <div class="flex gap-1">
            <button onclick="openReturnModal('${p.id}','${p.tracking_id}','return')" class="btn btn-red text-xs py-1.5 px-3">Retour</button>
            <button onclick="openReturnModal('${p.id}','${p.tracking_id}','reschedule')" class="btn btn-ghost text-xs py-1.5 px-3">Reprog.</button>
          </div>
        </td>
      </tr>`).join('')}</tbody>
  </table>`
}

function openReturnModal(id, tracking, action) {
  const modal = document.getElementById('reason-modal')
  document.getElementById('rm-title').textContent = action === 'return' ? 'Confirmer retour' : 'Reprogrammer'
  document.getElementById('rm-sub').textContent = `Colis: ${tracking}`
  document.getElementById('rm-note').value = ''

  if (action === 'return') {
    document.getElementById('rm-reasons').innerHTML = REASONS.map(r=>`
      <label class="flex items-center gap-2 text-sm cursor-pointer py-1">
        <input type="radio" name="reason" value="${r.val}" class="accent-green-500"> ${r.label}
      </label>`).join('')
  } else {
    document.getElementById('rm-reasons').innerHTML = ''
  }

  document.getElementById('rm-confirm').onclick = async () => {
    const note   = document.getElementById('rm-note').value.trim()
    const reschedule_date = document.getElementById('rm-date').value || null
    const fail_code = document.getElementById('rm-fail-code').value || null
    const reason = document.querySelector('input[name="reason"]:checked')?.value
    if (action === 'return' && !reason) { toast('Sélectionnez une raison','err'); return }
    try {
      if (action === 'return') {
        await api(`/api/returns/${id}/receive`,{method:'POST',body:JSON.stringify({reason,note})})
        toast('Retour enregistré')
      } else {
        await api(`/api/returns/${id}/reschedule`,{method:'POST',body:JSON.stringify({note,reschedule_date,reason:fail_code})})
        toast('Colis reprogrammé')
      }
      closeReason(); loadZone()
    } catch(e) { toast(e.message,'err') }
  }
  modal.classList.remove('hidden')
}

function closeReason() { document.getElementById('reason-modal').classList.add('hidden') }

function selectedReturns(){return [...document.querySelectorAll('.ret-check:checked')].map(c=>c.value)}
function bulkReschedule(){const ids=selectedReturns(); if(!ids.length)return toast('Sélectionnez des colis','err'); const date=prompt('Nouvelle date (YYYY-MM-DD)'); if(!date)return; Promise.all(ids.map(id=>api(`/api/returns/${id}/reschedule`,{method:'POST',body:JSON.stringify({reschedule_date:date,note:'Bulk reschedule'})}))).then(()=>{toast('Bulk reprogrammation terminée');loadZone()}).catch(e=>toast(e.message,'err'))}
function bulkReturn(){const ids=selectedReturns(); if(!ids.length)return toast('Sélectionnez des colis','err'); const reason=prompt('Code raison (client_absent/refused/wrong_address/no_answer)','refused'); if(!reason)return; Promise.all(ids.map(id=>api(`/api/returns/${id}/receive`,{method:'POST',body:JSON.stringify({reason,note:'Bulk return'})}))).then(()=>{toast('Bulk retour terminé');loadZone()}).catch(e=>toast(e.message,'err'))}

// ── Paiements ─────────────────────────────────────────────────────────────────
async function loadPayout() {
  const data = await api('/api/sellers')
  const owing = data.filter(s => s.balance > 0)
  const el = document.getElementById('payout-table')
  if (!owing.length) { el.innerHTML = '<div class="text-center py-8 text-sm text-gray-400">Aucun paiement dû</div>'; return }
  el.innerHTML = `<table>
    <thead><tr><th>Expéditeur</th><th>Téléphone</th><th>Solde dû</th><th>Action</th></tr></thead>
    <tbody>${owing.map(s=>`
      <tr>
        <td><div class="font-medium">${s.full_name}</div>${s.business_name?`<div class="text-xs text-gray-400">${s.business_name}</div>`:''}</td>
        <td>${s.phone}</td>
        <td class="font-bold text-green-700">${s.balance.toLocaleString('fr-DZ')} DZD</td>
        <td><button onclick="openPayoutModal('${s.id}','${s.full_name}',${s.balance})" class="btn btn-green text-xs py-1.5 px-4">Payer</button></td>
      </tr>`).join('')}</tbody>
  </table>`
}

function openPayoutModal(id, name, balance) {
  activeSellerId = id
  document.getElementById('pm-seller').textContent = `${name} — solde: ${balance.toLocaleString('fr-DZ')} DZD`
  document.getElementById('pm-amount').value = balance
  document.getElementById('payout-modal').classList.remove('hidden')
}

function closePayout() { document.getElementById('payout-modal').classList.add('hidden'); activeSellerId = null }

async function confirmPayout() {
  if(!confirm('Confirmer ce versement vendeur ? Un reçu de paiement sera généré.')) return
  const amount = parseFloat(document.getElementById('pm-amount').value)
  const note   = document.getElementById('pm-note').value.trim() || 'Versement COD'
  if (!amount || amount <= 0) { toast('Montant invalide','err'); return }
  try {
    await api(`/api/returns/payout/${activeSellerId}`,{method:'POST',body:JSON.stringify({amount,note})})
    toast(`Paiement de ${amount.toLocaleString('fr-DZ')} DZD enregistré`)
    closePayout(); loadPayout()
  } catch(e) { toast(e.message,'err') }
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST',headers:authHeaders({})}).catch(()=>{})
  logoutToLogin()
}

loadZone()
</script>
</body>
</html>
