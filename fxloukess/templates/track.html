<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi de colis — fxloukess</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .step { display:flex; gap:12px; align-items:flex-start; }
    .step-dot { width:12px; height:12px; border-radius:50%; margin-top:4px; flex-shrink:0; }
    .step-line { width:2px; background:#e5e7eb; flex-shrink:0; margin-left:5px; }
    .step-active .step-dot { background:#16a34a; }
    .step-done .step-dot { background:#16a34a; }
    .step-pending .step-dot { background:#e5e7eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-start pt-12 px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
        </div>
        <span class="text-xl font-semibold text-gray-900">fxloukess</span>
      </div>
      <h1 class="text-2xl font-medium text-gray-900 mb-1">Suivi de colis</h1>
      <p class="text-gray-500 text-sm">Entrez votre numéro de suivi</p>
    </div>

    <div class="bg-white border border-gray-100 rounded-2xl p-6 mb-4">
      <div class="flex gap-3">
        <input id="tracking-input" type="text" placeholder="Ex: ORA202505010001"
          class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-green-500"
          onkeydown="if(event.key==='Enter') track()">
        <button onclick="track()" id="track-btn"
          class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl text-sm font-medium transition">
          Suivre
        </button>
      </div>
    </div>

    <div id="result" class="hidden"></div>
    <div id="error-msg" class="hidden bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl px-4 py-3 text-center"></div>

  </div>

  <script>
    const STATUS_LABELS = {
      created: 'Colis enregistré',
      assigned: 'Assigné à un livreur',
      out_for_delivery: 'En cours de livraison',
      delivered: 'Livré',
      failed: 'Tentative échouée',
      returned: 'Retourné',
      rescheduled: 'Reprogrammé',
      waiting_for_client: 'En attente du client',
      held_at_station: 'En attente à la station',
      lost: 'Perdu'
    }
    const STATUS_ORDER = ['created','assigned','out_for_delivery','delivered']

    async function track() {
      const id = document.getElementById('tracking-input').value.trim().toUpperCase()
      const btn = document.getElementById('track-btn')
      const result = document.getElementById('result')
      const errEl = document.getElementById('error-msg')
      if (!id) return
      btn.textContent = '...'
      btn.disabled = true
      result.classList.add('hidden')
      errEl.classList.add('hidden')

      try {
        const res = await fetch(`/api/packages/track/${id}`)
        if (!res.ok) throw new Error('Colis introuvable')
        const p = await res.json()
        renderResult(p)
      } catch(e) {
        errEl.textContent = 'Colis introuvable. Vérifiez le numéro.'
        errEl.classList.remove('hidden')
      } finally {
        btn.textContent = 'Suivre'
        btn.disabled = false
      }
    }

    function renderResult(p) {
      const status = p.status
      const statusColor = {
        delivered: 'bg-green-100 text-green-700',
        failed: 'bg-red-100 text-red-700',
        returned: 'bg-gray-100 text-gray-600',
        out_for_delivery: 'bg-orange-100 text-orange-700',
      }[status] || 'bg-blue-100 text-blue-700'

      const steps = STATUS_ORDER.map((s, i) => {
        const idx = STATUS_ORDER.indexOf(status)
        const cls = i < idx ? 'step-done' : i === idx ? 'step-active' : 'step-pending'
        return { label: STATUS_LABELS[s] || s, cls }
      })

      const history = (p.history || []).reverse().map(h => `
        <div class="flex items-start gap-3 py-2 border-b border-gray-50 last:border-0">
          <div class="text-xs text-gray-400 whitespace-nowrap mt-0.5">${h.created_at ? new Date(h.created_at).toLocaleDateString('fr-DZ') : ''}</div>
          <div>
            <div class="text-sm text-gray-700">${STATUS_LABELS[h.new_status] || h.new_status}</div>
            ${h.reason ? `<div class="text-xs text-gray-400">${h.reason}</div>` : ''}
          </div>
        </div>
      `).join('')

      document.getElementById('result').innerHTML = `
        <div class="bg-white border border-gray-100 rounded-2xl p-6 mb-4">
          <div class="flex items-center justify-between mb-4">
            <div class="font-mono font-bold text-gray-900">${p.tracking_id}</div>
            <span class="text-xs px-3 py-1 rounded-full font-medium ${statusColor}">${STATUS_LABELS[status] || status}</span>
          </div>
          <div class="grid grid-cols-2 gap-3 text-sm mb-4">
            <div><div class="text-xs text-gray-400">Destinataire</div><div class="font-medium">${p.recipient_name}</div></div>
            <div><div class="text-xs text-gray-400">Wilaya</div><div>${p.wilaya}</div></div>
            <div><div class="text-xs text-gray-400">Tentatives</div><div>${p.attempts}</div></div>
            ${p.delivered_at ? `<div><div class="text-xs text-gray-400">Livré le</div><div class="text-green-600">${new Date(p.delivered_at).toLocaleDateString('fr-DZ')}</div></div>` : ''}
          </div>
          ${history ? `
            <div class="border-t border-gray-100 pt-4">
              <div class="text-xs text-gray-400 uppercase font-medium mb-3">Historique</div>
              ${history}
            </div>
          ` : ''}
        </div>
      `
      document.getElementById('result').classList.remove('hidden')
    }
  </script>
</body>
</html>
