<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>fxloukess — Dispatch</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:system-ui,-apple-system,sans-serif}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:#6b7280;cursor:pointer;transition:all .15s}
  .nav-item:hover{background:#f0fdf4;color:#16a34a}
  .nav-item.active{background:#dcfce7;color:#15803d;font-weight:500}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
  .btn-green{background:#22c55e;color:#fff}.btn-green:hover{background:#16a34a}
  .btn-ghost{background:#fff;border:1px solid #e5e7eb;color:#374151}.btn-ghost:hover{background:#f9fafb}
  .btn-red{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}.btn-red:hover{background:#fee2e2}
  .input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
  .input:focus{border-color:#22c55e;box-shadow:0 0 0 3px #dcfce7}
  .select{border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;background:#fff}
  .pkg-row{border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s;padding:12px 16px;display:flex;align-items:center;gap:14px}
  .pkg-row:last-child{border-bottom:none}
  .pkg-row:hover{background:#f9fafb}
  .pkg-row.selected{background:#dcfce7;outline:2px solid #22c55e;outline-offset:-2px;border-radius:8px}
  .toast{position:fixed;bottom:24px;right:24px;z-index:100;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.12);animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  #content>div{display:none}#content>div.active{display:block}
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<aside class="fixed left-0 top-0 h-full w-52 bg-white border-r border-gray-100 flex flex-col z-10">
  <div class="p-4 border-b border-gray-100 flex items-center gap-2.5">
    <div class="w-8 h-8 bg-green-500 rounded-xl flex items-center justify-center">
      <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
    </div>
    <span class="font-semibold text-gray-900 text-sm">fxloukess</span>
  </div>
  <nav class="flex-1 p-3 space-y-0.5">
    <div class="nav-item active" onclick="nav('assign')" id="nav-assign">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Assigner colis
    </div>
    <div class="nav-item" onclick="nav('bags')" id="nav-bags">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke-width="2"/><path stroke-linecap="round" stroke-width="2" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Sacs livreurs
    </div>
  </nav>
  <div class="p-3 border-t border-gray-100">
    <div class="flex items-center gap-2 px-2 py-2">
      <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-green-700 text-xs font-bold" id="user-initials">DP</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-semibold text-gray-900 truncate" id="user-name">Dispatch</div>
        <div class="text-xs text-gray-400">Dispatch</div>
      </div>
      <button onclick="logout()" class="text-gray-300 hover:text-red-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </div>
</aside>

<main class="ml-52 p-6" id="content">

  <!-- ASSIGN -->
  <div id="page-assign" class="active">
    <div class="mb-5 flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-semibold text-gray-900">Assigner des colis</h1>
        <p class="text-sm text-gray-500 mt-0.5">Cliquez pour sélectionner, puis choisissez un livreur</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500 font-medium" id="sel-count">0 sélectionné(s)</span>
        <select class="select" id="driver-select">
          <option value="">Choisir un livreur…</option>
        </select>
        <button class="btn btn-green" onclick="assignSelected()">Assigner</button>
      </div>
    </div>

    <div class="bg-white border border-gray-100 rounded-xl" id="ready-list">
      <div class="text-center py-8 text-sm text-gray-400">Chargement…</div>
    </div>
  </div>

  <!-- BAGS -->
  <div id="page-bags">
    <div class="mb-5 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-900">Sacs livreurs</h1>
      <button class="btn btn-ghost" onclick="loadBags()">Rafraîchir</button>
    </div>
    <div class="grid grid-cols-3 gap-4" id="bags-grid">
      <div class="col-span-3 text-center py-8 text-sm text-gray-400">Chargement…</div>
    </div>
  </div>

</main>

<script>
const TOKEN = localStorage.getItem('token')
if (!TOKEN) location.replace('/login')

const NAME = localStorage.getItem('name') || 'DP'
document.getElementById('user-name').textContent = NAME
document.getElementById('user-initials').textContent = NAME.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()

let selected = new Set()

function api(url, opts={}) {
  opts.headers = {'Content-Type':'application/json', Authorization:'Bearer '+TOKEN, ...(opts.headers||{})}
  return fetch(url,opts).then(r=>{
    if (r.status===401){localStorage.clear();location.replace('/login')}
    return r.ok ? r.json() : r.json().then(d=>{throw new Error(d.detail||'Erreur')})
  })
}

function toast(msg, type='ok') {
  const el = document.createElement('div')
  el.className = `toast ${type==='ok'?'bg-gray-900 text-white':'bg-red-600 text-white'}`
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(()=>el.remove(),3500)
}

function nav(page) {
  document.querySelectorAll('[id^="nav-"]').forEach(el=>el.classList.remove('active'))
  document.querySelectorAll('#content > div').forEach(el=>el.classList.remove('active'))
  document.getElementById('nav-'+page)?.classList.add('active')
  document.getElementById('page-'+page)?.classList.add('active')
  const loaders = {assign:loadAssign, bags:loadBags}
  loaders[page]?.()
}

// ── Assign ────────────────────────────────────────────────────────────────────
async function loadAssign() {
  selected.clear()
  updateSelCount()
  const [pkgs, drivers] = await Promise.all([
    api('/api/dispatch/ready'),
    api('/api/drivers'),
  ])

  // Populate driver dropdown
  const sel = document.getElementById('driver-select')
  sel.innerHTML = '<option value="">Choisir un livreur…</option>' +
    (drivers||[]).filter(d=>d.is_active).map(d=>`<option value="${d.id}">${d.full_name} — ${d.wilaya}</option>`).join('')

  const list = document.getElementById('ready-list')
  if (!pkgs?.length) {
    list.innerHTML = '<div class="text-center py-8 text-sm text-gray-400">Aucun colis prêt à dispatcher</div>'
    return
  }

  list.innerHTML = `
    <div class="p-3 border-b border-gray-100 flex items-center justify-between">
      <span class="text-xs text-gray-400">${pkgs.length} colis disponibles — cliquez pour sélectionner</span>
      <button class="text-xs text-green-600 hover:underline" onclick="selectAll()">Tout sélectionner</button>
    </div>
    <div id="pkg-rows">
    ${pkgs.map(p=>`
      <div class="pkg-row" id="row-${p.id}" onclick="toggle('${p.id}')">
        <div class="w-5 h-5 border-2 border-gray-300 rounded flex items-center justify-center flex-shrink-0 check-box" id="chk-${p.id}"></div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-mono text-xs font-bold text-gray-900">${p.tracking_id}</span>
            ${p.is_fragile?'<span class="text-xs bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded">Fragile</span>':''}
          </div>
          <div class="text-sm font-medium text-gray-800 mt-0.5">${p.recipient_name}</div>
          <div class="text-xs text-gray-400">${p.wilaya} — ${p.commune} — ${p.address}</div>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="font-bold text-green-700 text-sm">${p.cod_amount.toLocaleString('fr-DZ')} DZD</div>
          <div class="text-xs text-gray-400">${p.recipient_phone}</div>
        </div>
      </div>`).join('')}
    </div>`
  window._pkgs = pkgs
}

function toggle(id) {
  const row = document.getElementById('row-'+id)
  const chk = document.getElementById('chk-'+id)
  if (selected.has(id)) {
    selected.delete(id)
    row.classList.remove('selected')
    chk.innerHTML = ''
    chk.classList.replace('border-green-500','border-gray-300')
    chk.classList.replace('bg-green-500','')
  } else {
    selected.add(id)
    row.classList.add('selected')
    chk.innerHTML = '<svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>'
    chk.classList.replace('border-gray-300','border-green-500')
    chk.style.background = '#22c55e'
  }
  updateSelCount()
}

function selectAll() {
  window._pkgs?.forEach(p => { if (!selected.has(p.id)) toggle(p.id) })
}

function updateSelCount() {
  document.getElementById('sel-count').textContent = selected.size + ' sélectionné(s)'
}

async function assignSelected() {
  const driver_id = document.getElementById('driver-select').value
  if (!driver_id)     { toast('Sélectionnez un livreur','err'); return }
  if (!selected.size) { toast('Sélectionnez au moins un colis','err'); return }
  try {
    const res = await api('/api/dispatch/assign',{method:'POST',body:JSON.stringify({driver_id,package_ids:[...selected]})})
    toast(`${res.assigned} colis assignés`)
    loadAssign()
  } catch(e) { toast(e.message,'err') }
}

// ── Bags ──────────────────────────────────────────────────────────────────────
async function loadBags() {
  const drivers = await api('/api/drivers')
  const grid = document.getElementById('bags-grid')
  const active = (drivers||[]).filter(d=>d.is_active)
  if (!active.length) { grid.innerHTML = '<div class="col-span-3 text-center py-8 text-sm text-gray-400">Aucun livreur actif</div>'; return }

  grid.innerHTML = active.map(d=>`
    <div class="bg-white border border-gray-100 rounded-xl p-5">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center font-bold text-green-700 text-sm flex-shrink-0">
          ${d.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
        </div>
        <div>
          <div class="font-semibold text-gray-900">${d.full_name}</div>
          <div class="text-xs text-gray-400">${d.phone}</div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center mb-4">
        <div class="bg-purple-50 rounded-lg p-2"><div class="text-xs text-gray-400">Sac</div><div class="font-bold text-purple-700">${d.packages_out}</div></div>
        <div class="bg-green-50 rounded-lg p-2"><div class="text-xs text-gray-400">Livrés</div><div class="font-bold text-green-700">${d.delivered_today}</div></div>
        <div class="bg-orange-50 rounded-lg p-2"><div class="text-xs text-gray-400">Cash</div><div class="font-bold text-orange-700 text-xs">${(d.cash_on_hand||0).toLocaleString()}</div></div>
      </div>
      <div id="bag-detail-${d.id}" class="mb-3 hidden"></div>
      <div class="flex gap-2">
        <button onclick="showBag('${d.id}')" class="btn btn-ghost text-xs flex-1 justify-center">Voir sac</button>
        <button onclick="confirmDepart('${d.id}','${d.full_name}')" class="btn btn-green text-xs flex-1 justify-center">Confirmer départ</button>
      </div>
    </div>`).join('')
}

async function showBag(driverId) {
  const el = document.getElementById('bag-detail-'+driverId)
  if (!el.classList.contains('hidden')) { el.classList.add('hidden'); return }
  el.innerHTML = '<div class="text-xs text-gray-400 text-center py-2">Chargement…</div>'
  el.classList.remove('hidden')
  const pkgs = await api(`/api/dispatch/driver/${driverId}/bag`)
  if (!pkgs?.length) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-2">Sac vide</div>'; return }
  el.innerHTML = '<div class="space-y-1">' + pkgs.map(p=>`
    <div class="flex justify-between text-xs py-1 border-b border-gray-50 last:border-0">
      <span class="font-mono font-bold text-gray-700">${p.tracking_id}</span>
      <span class="text-gray-500">${p.wilaya}</span>
      <span class="font-semibold text-green-700">${p.cod_amount.toLocaleString()} DZD</span>
    </div>`).join('') + '</div>'
}

async function confirmDepart(id, name) {
  if (!confirm(`Confirmer le départ de ${name} ?`)) return
  try {
    const res = await api(`/api/dispatch/driver/${id}/depart`,{method:'POST'})
    toast(`${res.count} colis mis en livraison`)
    loadBags()
  } catch(e) { toast(e.message,'err') }
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+TOKEN}}).catch(()=>{})
  localStorage.clear(); location.replace('/login')
}

loadAssign()
</script>
</body>
</html>
