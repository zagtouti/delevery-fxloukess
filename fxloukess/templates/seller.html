<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>fxloukess — Seller portal</title><script>tailwind={config:{darkMode:'class'}}</script><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/static/style.css"><script src="/static/app.js"></script></head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen dark:text-gray-100">
<header class="bg-white border-b border-gray-100 sticky top-0 z-10"><div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between"><div><h1 class="text-xl font-bold text-gray-900">Portail vendeur</h1><p class="text-sm text-gray-500">Suivi colis, finances et impressions</p></div><button onclick="logout()" class="btn btn-ghost">Déconnexion</button></div></header>
<main class="max-w-6xl mx-auto p-4 space-y-4">
  <section class="grid md:grid-cols-4 gap-3"><div class="bg-white rounded-2xl border border-gray-100 p-4"><div class="text-xs text-gray-400">Colis actifs</div><div id="st-active" class="text-2xl font-bold">—</div></div><div class="bg-white rounded-2xl border border-gray-100 p-4"><div class="text-xs text-gray-400">Livrés</div><div id="st-delivered" class="text-2xl font-bold text-green-600">—</div></div><div class="bg-white rounded-2xl border border-gray-100 p-4"><div class="text-xs text-gray-400">Retours</div><div id="st-returns" class="text-2xl font-bold text-red-600">—</div></div><div class="bg-white rounded-2xl border border-gray-100 p-4"><div class="text-xs text-gray-400">Solde estimé</div><div id="st-balance" class="text-2xl font-bold">—</div></div></section>
  <section class="bg-white rounded-2xl border border-gray-100 p-4"><div class="flex flex-wrap gap-3 items-center justify-between mb-3"><h2 class="font-semibold text-gray-900">Mes colis</h2><div class="flex gap-2"><input id="q" class="input w-64" placeholder="Tracking, client…" oninput="render()"><button class="btn btn-blue" onclick="copyPortal()">Partager portail</button></div></div><div id="packages" class="text-sm text-gray-400 py-8 text-center">Chargement…</div></section>
  <section class="bg-white rounded-2xl border border-gray-100 p-4"><div class="flex justify-between items-center mb-3"><h2 class="font-semibold text-gray-900">Ledger financier</h2><button class="btn btn-ghost" onclick="exportCsv()">Export CSV</button></div><div id="ledger" class="text-sm text-gray-400">Les écritures vendeur s'affichent ici quand l'API seller est disponible.</div></section>
</main>
<script>
let rows=[];async function api(url,opts={}){opts.headers=authHeaders(opts.headers||{});const r=await fetch(url,opts);if(r.status===401)return sessionExpired();if(!r.ok)throw new Error(await r.text());return r.json()}async function load(){try{rows=await api('/api/packages?limit=100')||[]}catch(e){rows=[]}render()}function render(){const q=document.getElementById('q').value.toLowerCase();const data=rows.filter(p=>JSON.stringify(p).toLowerCase().includes(q));document.getElementById('st-active').textContent=data.filter(p=>!['delivered','returned'].includes(p.status)).length;document.getElementById('st-delivered').textContent=data.filter(p=>p.status==='delivered').length;document.getElementById('st-returns').textContent=data.filter(p=>p.status==='returned').length;document.getElementById('st-balance').textContent=data.reduce((s,p)=>s+(p.status==='delivered'?Number(p.cod_amount||0):0),0).toLocaleString('fr-DZ')+' DZD';document.getElementById('packages').innerHTML=data.length?`<table><thead><tr><th>Tracking</th><th>Client</th><th>Statut</th><th>COD</th><th>Action</th></tr></thead><tbody>${data.map(p=>`<tr><td class="font-mono font-bold">${p.tracking_id}</td><td>${p.recipient_name||''}</td><td><span class="badge bg-green-100 text-green-700">${p.status}</span></td><td>${Number(p.cod_amount||0).toLocaleString('fr-DZ')} DZD</td><td><a class="text-green-600 text-xs" href="/track?t=${p.tracking_id}">Suivre</a></td></tr>`).join('')}</tbody></table>`:'<div class="py-8 text-center text-gray-400">Aucun colis</div>'}function exportCsv(){const csv=['tracking,status,cod',...rows.map(p=>`${p.tracking_id},${p.status},${p.cod_amount||0}`)].join('\n');const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'seller-ledger.csv'});a.click()}function copyPortal(){copyText(location.href)}async function logout(){await fetch('/api/auth/logout',{method:'POST',headers:authHeaders()}).catch(()=>{});logoutToLogin()}load()
</script></body></html>
