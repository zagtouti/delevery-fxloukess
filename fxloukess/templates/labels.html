<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>fxloukess — Impression étiquettes</title><script>tailwind={config:{darkMode:'class'}}</script><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/static/style.css"><script src="/static/app.js"></script></head><body class="bg-gray-50 dark:bg-gray-950 min-h-screen dark:text-gray-100"><main class="max-w-3xl mx-auto p-6"><div class="bg-white rounded-3xl border border-gray-100 p-6 shadow-sm"><h1 class="text-2xl font-bold text-gray-900">Imprimer une étiquette</h1><p class="text-sm text-gray-500 mt-1">Collez un ID colis ou plusieurs IDs séparés par virgule pour générer le PDF.</p><textarea id="ids" class="input mt-5 h-32" placeholder="package_id_1, package_id_2…"></textarea><div class="flex gap-2 mt-4"><button class="btn btn-green" onclick="printLabels()">Imprimer PDF</button><button class="btn btn-ghost" onclick="history.back()">Retour</button></div><div id="msg" class="text-sm mt-4 text-gray-500"></div></div></main><script>async function printLabels(){const ids=document.getElementById('ids').value.split(',').map(x=>x.trim()).filter(Boolean);if(!ids.length){msg.textContent='Ajoutez au moins un ID colis';return}const url=ids.length===1?`/api/labels/${ids[0]}`:'/api/labels/bulk';const opts=ids.length===1?{headers:authHeaders({})}:{method:'POST',headers:authHeaders(),body:JSON.stringify({package_ids:ids})};const r=await fetch(url,opts);if(r.status===401)return sessionExpired();if(!r.ok){msg.textContent='Impossible de générer les étiquettes';return}const blob=await r.blob();window.open(URL.createObjectURL(blob),'_blank')}</script></body></html>
