<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fxloukess — Accueil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; font-size:14px; color:#6b7280; cursor:pointer; transition:all .15s; }
    .nav-item:hover, .nav-item.active { background:#f0fdf4; color:#16a34a; }
    .status-badge { display:inline-flex; padding:2px 8px; border-radius:9999px; font-size:12px; font-weight:500; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="fixed left-0 top-0 h-full w-52 bg-white border-r border-gray-100 flex flex-col">
    <div class="p-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
        </div>
        <span class="font-medium text-gray-900">fxloukess</span>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a onclick="showPage('shift')" class="nav-item active" id="nav-shift">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Shift
      </a>
      <a onclick="showPage('receive')" class="nav-item" id="nav-receive">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Réception
      </a>
      <a onclick="showPage('cash')" class="nav-item" id="nav-cash">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
        Petite caisse
      </a>
    </nav>
    <div class="p-3 border-t border-gray-100">
      <div class="flex items-center gap-2 px-3 py-2">
        <div class="w-7 h-7 bg-green-100 rounded-full flex items-center justify-center">
          <span class="text-green-700 text-xs font-medium" id="user-initials">FD</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-medium text-gray-900 truncate" id="user-name">Front Desk</div>
        </div>
        <button onclick="logout()" title="Déconnexion">
          <svg class="w-4 h-4 text-gray-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="ml-52 p-6">

    <!-- SHIFT PAGE -->
    <div id="page-shift">
      <div class="mb-6">
        <h1 class="text-2xl font-medium text-gray-900">Gestion du Shift</h1>
      </div>
      <div id="shift-status" class="bg-white border border-gray-100 rounded-xl p-6 mb-4 max-w-lg">
        <div class="text-sm text-gray-400 text-center py-4">Chargement...</div>
      </div>
      <div id="shift-summary" class="grid grid-cols-3 gap-4 max-w-lg hidden">
        <div class="bg-white border border-gray-100 rounded-xl p-4 text-center">
          <div class="text-2xl font-medium text-gray-900" id="sum-packages">0</div>
          <div class="text-xs text-gray-400 mt-1">Colis ce shift</div>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 text-center">
          <div class="text-2xl font-medium text-green-600" id="sum-delivered">0</div>
          <div class="text-xs text-gray-400 mt-1">Livrés</div>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 text-center">
          <div class="text-2xl font-medium text-blue-600" id="sum-cod">0</div>
          <div class="text-xs text-gray-400 mt-1">COD DZD</div>
        </div>
      </div>
    </div>

    <!-- RECEIVE PAGE -->
    <div id="page-receive" class="hidden">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-medium text-gray-900">Réception colis</h1>
          <p class="text-sm text-gray-500 mt-1">Colis en zone de réception</p>
        </div>
        <button onclick="loadReceive()" class="border border-gray-200 text-sm px-4 py-2 rounded-lg hover:bg-gray-50">Rafraîchir</button>
      </div>
      <div id="receive-list">
        <div class="text-sm text-gray-400 text-center py-8">Chargement...</div>
      </div>
    </div>

    <!-- CASH PAGE -->
    <div id="page-cash" class="hidden">
      <div class="mb-6">
        <h1 class="text-2xl font-medium text-gray-900">Petite caisse</h1>
      </div>
      <div class="grid grid-cols-2 gap-6 max-w-2xl">
        <div>
          <div class="bg-white border border-gray-100 rounded-xl p-5 mb-4">
            <h3 class="text-sm font-medium text-gray-900 mb-4">Nouvelle entrée</h3>
            <div class="space-y-3">
              <select id="cash-category" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                <option value="">Catégorie</option>
                <option value="fournitures">Fournitures</option>
                <option value="transport">Transport</option>
                <option value="repas">Repas</option>
                <option value="autre">Autre</option>
              </select>
              <input id="cash-amount" type="number" placeholder="Montant (DZD)" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
              <input id="cash-note" type="text" placeholder="Note" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
              <button onclick="saveCash()" class="w-full bg-green-500 hover:bg-green-600 text-white text-sm py-2 rounded-lg">Enregistrer</button>
            </div>
          </div>
        </div>
        <div>
          <div class="bg-white border border-gray-100 rounded-xl p-5">
            <h3 class="text-sm font-medium text-gray-900 mb-4">Historique</h3>
            <div id="cash-list"><div class="text-sm text-gray-400 text-center py-4">Chargement...</div></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token')
    if (!token) window.location.href = '/login'

    const name = localStorage.getItem('name') || 'FD'
    document.getElementById('user-name').textContent = name
    document.getElementById('user-initials').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()

    function api(url, options={}) {
      return fetch(url, {
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        ...options
      }).then(r => r.ok ? r.json() : Promise.reject(r))
    }

    function showPage(page) {
      document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'))
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
      document.getElementById('page-' + page).classList.remove('hidden')
      document.getElementById('nav-' + page).classList.add('active')
      if (page === 'shift')   loadShift()
      if (page === 'receive') loadReceive()
      if (page === 'cash')    loadCash()
    }

    async function loadShift() {
      const [res, summary] = await Promise.all([
        api('/api/frontdesk/shift'),
        api('/api/frontdesk/shift/summary')
      ])
      const box = document.getElementById('shift-status')
      const sumEl = document.getElementById('shift-summary')

      if (res.shift) {
        const s = res.shift
        box.innerHTML = `
          <div class="flex items-center gap-3 mb-4">
            <span class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></span>
            <span class="font-medium text-gray-900">Shift ouvert — ${s.shift_type}</span>
          </div>
          <div class="text-xs text-gray-400 mb-4">Ouvert le ${new Date(s.opened_at).toLocaleString('fr-DZ')}</div>
          <button onclick="closeShift()" class="w-full border border-red-200 text-red-600 hover:bg-red-50 text-sm py-2 rounded-lg">Fermer le shift</button>
        `
        sumEl.classList.remove('hidden')
        document.getElementById('sum-packages').textContent = summary.packages || 0
        document.getElementById('sum-delivered').textContent = summary.delivered || 0
        document.getElementById('sum-cod').textContent = Number(summary.cod || 0).toLocaleString('fr-DZ')
      } else {
        box.innerHTML = `
          <div class="text-sm text-gray-500 mb-4">Aucun shift ouvert</div>
          <select id="shift-type" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-3">
            <option value="morning">Matin</option>
            <option value="afternoon">Après-midi</option>
            <option value="night">Nuit</option>
          </select>
          <button onclick="openShift()" class="w-full bg-green-500 hover:bg-green-600 text-white text-sm py-2 rounded-lg">Ouvrir un shift</button>
        `
        sumEl.classList.add('hidden')
      }
    }

    async function openShift() {
      const type = document.getElementById('shift-type')?.value || 'morning'
      await api('/api/frontdesk/shift/open', { method:'POST', body: JSON.stringify({ shift_type: type }) })
      loadShift()
    }

    async function closeShift() {
      if (!confirm('Fermer le shift ?')) return
      const notes = prompt('Notes de clôture (optionnel):') || ''
      await api('/api/frontdesk/shift/close', { method:'POST', body: JSON.stringify({ notes }) })
      loadShift()
    }

    async function loadReceive() {
      const data = await api('/api/frontdesk/receive/pending')
      const list = document.getElementById('receive-list')
      if (!data.length) { list.innerHTML = '<div class="text-sm text-gray-400 text-center py-8">Aucun colis en réception</div>'; return }
      list.innerHTML = `
        <div class="bg-white border border-gray-100 rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left px-4 py-3 text-xs text-gray-400 uppercase">Tracking</th>
                <th class="text-left px-4 py-3 text-xs text-gray-400 uppercase">Destinataire</th>
                <th class="text-left px-4 py-3 text-xs text-gray-400 uppercase">Wilaya</th>
                <th class="text-left px-4 py-3 text-xs text-gray-400 uppercase">COD</th>
                <th class="text-left px-4 py-3 text-xs text-gray-400 uppercase">Action</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
              ${data.map(p => `
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-3 font-mono text-xs font-bold">${p.tracking_id}</td>
                  <td class="px-4 py-3 font-medium text-gray-900">${p.recipient_name}</td>
                  <td class="px-4 py-3 text-gray-600">${p.wilaya}</td>
                  <td class="px-4 py-3 font-medium text-green-600">${Number(p.cod_amount).toLocaleString()} DZD</td>
                  <td class="px-4 py-3">
                    <button onclick="shelve('${p.id}')" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded-lg">Mettre en rayon</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `
    }

    async function shelve(id) {
      await api(`/api/frontdesk/receive/${id}/shelve`, { method:'PATCH' })
      loadReceive()
    }

    async function loadCash() {
      const data = await api('/api/frontdesk/petty-cash')
      const list = document.getElementById('cash-list')
      if (!data.length) { list.innerHTML = '<div class="text-sm text-gray-400 text-center py-4">Aucune entrée</div>'; return }
      list.innerHTML = data.map(e => `
        <div class="flex justify-between py-2 border-b border-gray-50 last:border-0">
          <div>
            <div class="text-sm font-medium text-gray-900">${e.category}</div>
            <div class="text-xs text-gray-400">${e.note}</div>
          </div>
          <div class="text-sm font-medium text-red-600">-${Number(e.amount).toLocaleString()} DZD</div>
        </div>
      `).join('')
    }

    async function saveCash() {
      const cat = document.getElementById('cash-category').value
      const amt = document.getElementById('cash-amount').value
      const note = document.getElementById('cash-note').value
      if (!cat || !amt || !note) { alert('Remplissez tous les champs'); return }
      await api('/api/frontdesk/petty-cash', { method:'POST', body: JSON.stringify({ category:cat, amount: parseFloat(amt), note }) })
      document.getElementById('cash-amount').value = ''
      document.getElementById('cash-note').value = ''
      loadCash()
    }

    async function logout() {
      await fetch('/api/auth/logout', { method:'POST' })
      localStorage.clear()
      window.location.href = '/login'
    }

    loadShift()
  </script>
</body>
</html>
